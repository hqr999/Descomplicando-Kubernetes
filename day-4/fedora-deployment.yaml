apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: fedora-deployment
  name: fedora-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedora-deployment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: fedora-deployment
    spec:
      containers:
      - image: fedora:latest 
        name: fedora 
        command: ["/bin/bash","-c","while true; do echo 'Fedora container rodando'; sleep 10; done"]
        resources:
          limits:
            cpu: 0.75
            memory: 64Mi
          requests:
            cpu: 0.25
            memory: 32Mi
        livenessProbe:
          httpGet: 
            path: /
            port: 80
          initialDelaySeconds: 7 
          periodSeconds: 7
          timeoutSeconds: 4  
          failureThreshold: 2 
        readinessProbe:
          exec:
            command:
            - echo
            - Ola
          initialDelaySeconds: 7 
          periodSeconds: 7
          timeoutSeconds: 4 
          failureThreshold: 2
          successThreshold: 1
        startupProbe:
          tcpSocket:
            port: 80 
          initialDelaySeconds: 10 
          timeoutSeconds: 5 
          failureThreshold: 1
          successThreshold: 1



