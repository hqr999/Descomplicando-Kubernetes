events {}
http {
    server {
      listen 80;
      listen 443 ssl;
      ssl_certificate /etc/nginx/tls/certificado.crt; 
      ssl_certificate_key /stc/nginx/tls/chave-privada.key; 

      location / {
        return 200 'Olá terraqueos e extraterrestres!\n';
        add_header Content-Type text/plan;
    }
  }
}









