apiVersion: autoscaling/v2 
kind: HorizontalPodAutoscaler 
metadata:
  name: nginx-hpa 
spec:
  scaleTargetRef:
    apiVersion: apps/v1 
    kind: Deployment 
    name: nginx 
  minReplicas: 3 
  maxReplicas: 8
  metrics:
  - type: Resource
    resource: 
      name: cpu 
      target: 
        type: Utilization 
        averageUtilization: 50
